{% extends "base.html" %}

{% block content %}
    <div id="app">
        <aside id="sidebar">
            <div id="sidebar-head">
                <span class="brand"><span class="brand-glyph" aria-hidden="true">Z/</span>Zyle<span>Bot</span></span>
                <button id="new-chat" title="New chat"><span aria-hidden="true">+</span> New</button>
            </div>
            <ul id="conversation-list"></ul>
        </aside>
        <main id="main">
            <header>
                <span id="status" class="status">checking LM Studio...</span>
                <button id="start-server-btn" class="start-server-btn" title="Runs `lms server start`" hidden>▶ Start server</button>
                <select id="model-select" class="model-select" title="Active model (switching swaps the loaded model in LM Studio)"></select>
                <span id="context-gauge" class="context-gauge" title="context window usage">
                    <span id="context-bar-track" class="context-bar-track">
                        <span id="context-bar-fill" class="context-bar-fill"></span>
                    </span>
                    <span id="context-text" class="context-text">—</span>
                </span>
            </header>
            <div id="transcript"></div>
            <div id="attachments" class="attachments"></div>
            <form id="chat-form">
                <button type="button" id="attach-btn" title="Attach an image" disabled>📎</button>
                <input type="file" id="file-input" accept="image/*" multiple hidden />
                <button type="button" id="mic-btn" title="Speak your message" disabled>🎤</button>
                <input id="message-input" type="text" placeholder="Ask ZyleBot… (or paste an image)" autocomplete="off" disabled />
                <button type="submit" disabled>Send</button>
            </form>

            {% include "_footer.html" %}
        </main>
    </div>
{% endblock %}

{% block scripts %}
    <script src="/static/app.js"></script>
{% endblock %}
